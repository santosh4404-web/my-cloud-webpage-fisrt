<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Web Page</title>
    <style>
        /* CSS Styling */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 150px;
            background-color: var(--card-bg);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #f0f0f0;
            border-radius: 5px;
        }

        input {
            width: 90%;
            padding: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>My Interactive Web Page</h1>

    <div class="container">
        <div class="card">
            <h3>Click Counter</h3>
            <p id="counter">0</p>
            <button onclick="incrementCounter()">Click Me</button>
        </div>

        <div class="card" style="width: 200px;">
            <h3>Live Text Display</h3>
            <input type="text" id="textInput" placeholder="Type something..." oninput="updateText()">
            <p>You typed: <span id="displayText"></span></p>
        </div>
    </div>

    <div class="controls">
        <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <button onclick="showWelcome()">Show Welcome Message</button>
    </div>

    <script>
        // JavaScript Logic
        let count = 0;

        function incrementCounter() {
            count++;
            document.getElementById('counter').innerText = count;
        }

        function updateText() {
            const input = document.getElementById('textInput').value;
            document.getElementById('displayText').innerText = input;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function showWelcome() {
            alert("Welcome to my interactive website!");
        }
    </script>
</body>
</html>
